---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: audiomuse
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: audiomuse-secret
    creationPolicy: Owner
    template:
      data:
        POSTGRES_HOST: &dbHost postgres16-rw.database.svc
        POSTGRES_DB: &dbDatabase audiomuse_main
        POSTGRES_USER: &dbUser "{{ .DATABASE_USER }}"
        POSTGRES_PASSWORD: &dbPass "{{ .DATABASE_PASSWORD }}"

        INIT_POSTGRES_DBNAME: *dbDatabase
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_SUPER_PASS: '{{ .CNPG_password }}'
  dataFrom:
    - extract:
        key: AudioMuse
    - extract:
        key: cloudnative-pg
      rewrite:
        - regexp:
            source: "(.*)"
            target: "CNPG_$1"
