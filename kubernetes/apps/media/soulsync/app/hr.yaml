---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app soulsync
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      soulsync:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: boulderbadgedad/soulsync
              tag: latest@sha256:57f1c9158818b0dc43b4dc84d4e703c565a65cb34d9285bf393b387a3f808a7e
            env:
              TZ: ${TIMEZONE}
              PUID: ${NAS_UID}
              PGID: ${NAS_GID}
              UMASK: "022"
              FLASK_ENV: production
              PYTHONPATH: /app
              SOULSYNC_CONFIG_PATH: /app/config/config.json
    service:
      app:
        ports:
          http:
            port: &port 8008
          spotify:
            port: 8888
          tidal:
            port: 8889
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/config
            subPath: config
          - path: /app/logs
            subPath: logs
          - path: /app/downloads
            subPath: downloads
          - path: /app/data
            subPath: data
          - path: /app/Staging
            subPath: Staging
      music:
        type: nfs
        server: "${NAS_ADDRESS}"
        path: "/mnt/core/media/audio/music"
        globalMounts:
          - path: /app/Transfer
      tmp:
        type: emptyDir
