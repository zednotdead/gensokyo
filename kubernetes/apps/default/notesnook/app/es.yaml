---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notesnook
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: notesnook-secret
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        NOTESNOOK_API_SECRET: '{{ .NN_API_SECRET }}'
        MONGODB_CONNECTION_STRING: mongodb://{{ .NN_DATABASE_USERNAME }}:{{ .NN_DATABASE_PASSWORD }}@ferretdb:27017/
        MONGODB_DATABASE_NAME: notesnook
        S3_ACCESS_KEY_ID: "{{ .S3_username }}"
        S3_ACCESS_KEY: "{{ .S3_password }}"
        SMTP_USERNAME: '{{ .SMTP_USERNAME }}'
        SMTP_PASSWORD: '{{ .SMTP_PASSWORD }}'
        SMTP_HOST: '{{ .SMTP_HOST }}'
        SMTP_PORT: '{{ .SMTP_PORT }}'
  dataFrom:
    - extract:
        key: Notesnook
      rewrite:
        - regexp:
            source: "(.*)"
            target: "NN_$1"
    - extract:
        key: Minio
      rewrite:
        - regexp:
            source: "(.*)"
            target: "S3_$1"
    - extract:
        key: SMTP
      rewrite:
        - regexp:
            source: "(.*)"
            target: "SMTP_$1"
