---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app notesnook
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      sync:
        containers:
          app:
            image:
              repository: streetwriters/notesnook-sync
              tag: v1.0-beta.22@sha256:da898d80da8634958c91ece75e76d117ea00a62fafbc74135ae48bd160797e39
            envFrom: &env
              - configMapRef:
                  name: notesnook
              - secretRef:
                  name: notesnook-secret
            env:
              SELF_HOSTED: "1"
              MONGODB_DATABASE_NAME: notesnook
              IDENTITY_SERVER_HOST: &identityHost notesnook-identity
              IDENTITY_SERVER_PORT: &identityPort 8264
              NOTESNOOK_SERVER_HOST: &serverHost notesnook-server
              NOTESNOOK_SERVER_PORT: &serverPort 5264
              SSE_SERVER_HOST: &sseHost notesnook-sse
              SSE_SERVER_PORT: &ssePort 7264
              S3_INTERNAL_SERVICE_URL: "http://minio:9000"
              S3_INTERNAL_BUCKET_NAME: &bucket "notesnook"
              S3_SERVICE_URL: https://s3.${SECRET_DOMAIN}
              S3_REGION: "us-east-1"
              S3_BUCKET_NAME: *bucket
      identity-server:
        containers:
          app:
            image:
              repository: streetwriters/identity
              tag: v1.0-beta.22@sha256:1b3138eb2b891bfbc542dd0b0538276a3ced48f978d3db4bcc348f7ed8fff562
            envFrom: *env
            env:
              SELF_HOSTED: "1"
              MONGODB_DATABASE_NAME: identity-server
              IDENTITY_SERVER_HOST: *identityHost
              IDENTITY_SERVER_PORT: *identityPort
              NOTESNOOK_SERVER_HOST: *serverHost
              NOTESNOOK_SERVER_PORT: *serverPort
              SSE_SERVER_HOST: *sseHost
              SSE_SERVER_PORT: *ssePort
      sse:
        containers:
          app:
            image:
              repository: streetwriters/sse
              tag: v1.0-beta.22@sha256:e0fce467802743d4e44e37c33cf831292aa12dcee8384f8878f3b236076b21a3
            envFrom: *env
            env:
              SELF_HOSTED: "1"
              IDENTITY_SERVER_HOST: *identityHost
              IDENTITY_SERVER_PORT: *identityPort
              NOTESNOOK_SERVER_HOST: *serverHost
              NOTESNOOK_SERVER_PORT: *serverPort
              SSE_SERVER_HOST: *sseHost
              SSE_SERVER_PORT: *ssePort
      monograph:
        containers:
          app:
            image:
              repository: streetwriters/monograph
              tag: 1.2.7@sha256:dad4985d1ef48453a183d10c1b204d97a28dc6d182c76657378ff4eadca65ca6
            envFrom: *env
            env:
              SELF_HOSTED: "1"
              IDENTITY_SERVER_HOST: *identityHost
              IDENTITY_SERVER_PORT: *identityPort
              NOTESNOOK_SERVER_HOST: *serverHost
              NOTESNOOK_SERVER_PORT: *serverPort
              SSE_SERVER_HOST: *sseHost
              SSE_SERVER_PORT: *ssePort
              API_HOST: http://notesnook-server:5264
              PUBLIC_URL: https://mono.${SECRET_DOMAIN}
    service:
      identity:
        controller: identity-server
        ports:
          http:
            port: *identityPort
      sse:
        controller: sse
        ports:
          http:
            port: *ssePort
      monograph:
        controller: monograph
        ports:
          http:
            port: &monoPort 3000
      sync:
        controller: sync
        ports:
          http:
            port: *serverPort
    serviceMonitor:
      app:
        serviceName: ferretdb
        endpoints:
          - port: metrics
            scheme: http
            path: /debug/metrics
            interval: 1m
            scrapeTimeout: 10s
    route:
      sync:
        hostnames: ["nn.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: sync
                port: *serverPort
      monograph:
        hostnames: ["mono.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: monograph
                port: *monoPort
      identity-server:
        hostnames: ["auth-nn.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: identity
                port: *monoPort
  valuesFrom:
    - kind: Secret
      name: notesnook-secret
      valuesKey: IDENTITY_MONGODB_CONNECTION_STRING
      targetPath: controllers.identity-server.containers.app.env.MONGODB_CONNECTION_STRING
