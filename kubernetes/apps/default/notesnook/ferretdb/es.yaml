---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferretdb-cluster
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: cloudnative-pg-secret
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .NN_DATABASE_USERNAME }}"
        password: "{{ .NN_DATABASE_PASSWORD }}"
        aws-access-key-id: "{{ .accessKey }}"
        aws-secret-access-key: "{{ .secretKey }}"
        ca.crt: '{{ index . "ca.crt" }}'
        FERRETDB_POSTGRESQL_URL: |-
          postgresql://{{ .NN_DATABASE_USERNAME }}:{{ .NN_DATABASE_PASSWORD }}@ferretdb-rw.default.svc/ferret
  dataFrom:
    - extract:
        key: Notesnook
      rewrite:
        - regexp:
            source: "(.*)"
            target: "NN_$1"
    - extract:
        key: Minio
    - extract:
        key: TrueNAS CA
