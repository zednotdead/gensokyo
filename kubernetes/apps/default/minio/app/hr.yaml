---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 1h
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsGroup: 473
        runAsUser: 473
    controllers:
      minio:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/rustfs/rustfs
              tag: 1.0.0-alpha.90
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            env:
              RUSTFS_VOLUMES: "/data"
              RUSTFS_ADDRESS: "0.0.0.0:9000"
              RUSTFS_CONSOLE_ENABLE: "true"
              RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
              RUSTFS_UPDATE: "off"
              RUSTFS_BROWSER_REDIRECT_URL: https://minio.${SECRET_DOMAIN}
              RUSTFS_SERVER_URL: https://s3.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: minio-secret
    service:
      main:
        controller: minio
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${MINIO_ADDRESS}
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: 9001
          api:
            port: 9000
    route:
      main:
        hostnames: ["minio.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: minio
                port: 9001
      s3:
        hostnames: ["s3.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: minio
                port: 9000
    serviceMonitor:
      main:
        serviceName: minio
        enabled: true
        endpoints:
          - port: api
            scheme: http
            path: /minio/v2/metrics/cluster
            interval: 1m
            scrapeTimeout: 10s
    persistence:
      config:
        enabled: true
        existingClaim: minio-nfs
        globalMounts:
          - path: /data
