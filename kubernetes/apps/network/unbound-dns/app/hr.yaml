---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app unbound-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: 1.19.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 5
  values:
    fullnameOverride: *app
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/guillomep/external-dns-unbound-webhook
          tag: v0.1.3@sha256:4bc8a0e0647b087f111795f714de1d292ee0dd5180fbddb40b80c56c671657be
        env:
          - name: UNBOUND_HOST
            value: tcp://10.0.0.1:8953
          - name: UNBOUND_CA_PEM_PATH
            value: /usr/local/etc/unbound/ca.pem
          - name: UNBOUND_CERT_PEM_PATH
            value: /usr/local/etc/unbound/client.pem
          - name: UNBOUND_KEY_PEM_PATH
            value: /usr/local/etc/unbound/client.key
        livenessProbe:
          httpGet:
            path: /health
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        extraVolumeMounts:
        - name: unbound-certificates
          mountPath: /usr/local/etc/unbound/
    extraVolumes:
      - name: unbound-certificates
        secret:
          secretName: unbound-certificates
    policy: sync
    extraArgs:
      - "--txt-prefix=reg-%{record_type}-"
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=envoy-internal
    triggerLoopOnEvent: true
    sources: ["crd", "gateway-httproute"]
    registry: noop
    domainFilters: ["${SECRET_DOMAIN}"]
    serviceMonitor:
      enabled: true
